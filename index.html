---
layout: default
---
<div class="wrapper">
  <div class="home">
    {% include posts-list.html posts=paginator.posts %}
    <nav class="pagination" aria-label="Pagination">
      <div class="pagination-edge">
        {% if paginator.previous_page %}
          <a href="{{ paginator.previous_page_path }}" class="pagination-link previous">Previous</a>
        {% endif %}
      </div>
      <div class="pagination-current">
        Page {{ paginator.page }} of {{ paginator.total_pages }}
      </div>
      <div class="pagination-edge pagination-edge-next">
        {% if paginator.next_page %}
          <a href="{{ paginator.next_page_path }}" class="pagination-link next">Next</a>
        {% endif %}
      </div>
    </nav>
  </div>
</div>
