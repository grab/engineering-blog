<section
  class="related-jobs-section"
  id="related-jobs"
  data-tags='{{ page.tags | jsonify }}'
  data-limit="{{ site.careers.related_jobs_limit | default: 3 }}"
  aria-live="polite"
>
  <h2 class="related-jobs-heading">Related jobs at Grab</h2>
  <p class="related-jobs-status">Loading opportunities…</p>
  <ul class="related-jobs-cards" hidden></ul>
  <p class="related-jobs-fallback" hidden>
    <a href="{{ site.careers.engineering_jobs_url }}" target="_blank" rel="noopener noreferrer">Browse open roles at Grab Careers</a>
  </p>
</section>
<script src="/js/related-jobs.js" defer></script>
