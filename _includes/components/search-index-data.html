<script>
  window.blogSearchIndex = [
    {% for post in site.posts %}
    {
      "title": {{ post.title | jsonify }},
      "url": {{ post.url | jsonify }},
      "tags": {{ post.tags | jsonify }},
      "date": {{ post.date | date: site.post.date_format | jsonify }},
      "excerpt": {{ post.excerpt | default: post.content | strip_html | strip_newlines | truncate: 160 | jsonify }}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];
</script>
