{% if page.audio_url %}
<aside class="article-listen article-listen--hosted" aria-label="Listen to this article">
  <div class="article-listen-inner">
    <div class="article-listen-icon-wrap" aria-hidden="true">
      <i class="fa fa-headphones"></i>
    </div>
    <div class="article-listen-copy">
      <p class="article-listen-label">🔊 Listen to Article</p>
      <audio class="article-listen-audio" controls preload="none" src="{{ page.audio_url }}">
        Your browser does not support the audio element.
      </audio>
    </div>
  </div>
</aside>
{% else %}
<aside
  class="article-listen"
  id="article-listen"
  aria-label="Listen to this article"
  data-title="{{ page.title | escape }}"
>
  <div class="article-listen-inner">
    <button
      type="button"
      class="article-listen-toggle"
      id="article-listen-toggle"
      aria-label="Play article audio"
      aria-pressed="false"
    >
      <i class="fa fa-play article-listen-icon article-listen-icon--play" aria-hidden="true"></i>
      <i class="fa fa-pause article-listen-icon article-listen-icon--pause" aria-hidden="true"></i>
    </button>
    <div class="article-listen-copy">
      <p class="article-listen-label">🔊 Listen to Article</p>
      <p class="article-listen-meta" id="article-listen-meta"></p>
    </div>
    <label class="article-listen-speed-label">
      <span class="visually-hidden">Playback speed</span>
      <select class="article-listen-speed" id="article-listen-speed" aria-label="Playback speed">
        <option value="1">1×</option>
        <option value="1.25">1.25×</option>
        <option value="1.5">1.5×</option>
        <option value="2">2×</option>
      </select>
    </label>
  </div>
  <p class="article-listen-unsupported" id="article-listen-unsupported" hidden>
    Audio playback is not supported in this browser.
  </p>
</aside>
<script src="/js/article-listen.js" defer></script>
{% endif %}
