{% assign popular_tags = site.posts | popular_tags: 5 %}

<aside class="sidebar-panel home-tag-filter-panel" id="home-tag-filter">
  <button
    type="button"
    class="home-tag-filter-toggle"
    id="home-tag-filter-toggle"
    aria-expanded="true"
    aria-controls="home-tag-filter-body"
  >
    <span class="home-tag-filter-toggle-label">Browse by topic</span>
    <span class="home-tag-filter-chevron" aria-hidden="true"></span>
  </button>

  <div class="home-tag-filter-body" id="home-tag-filter-body">
    <div class="home-tag-filter-body-inner">
      <div class="home-tag-filter-nav" id="home-tag-filter-nav" role="group" aria-label="Filter articles by tag">
        {% for tag in popular_tags %}
          <label class="filter-tag-option">
            <input
              type="checkbox"
              class="filter-tag-checkbox"
              value="{{ tag.slug }}"
              data-tag-slug="{{ tag.slug }}"
            >
            <span class="filter-tag-label">{{ tag.name }}</span>
            <span class="filter-tag-count">{{ tag.count }}</span>
          </label>
        {% endfor %}
      </div>

      <button type="button" class="filter-clear-btn" id="home-tag-filter-clear" hidden>
        Clear all
      </button>
    </div>
  </div>
</aside>

<script>
  window.blogFilterTags = {{ popular_tags | jsonify }};
</script>
<script src="/js/home-tag-filter.js" defer></script>
