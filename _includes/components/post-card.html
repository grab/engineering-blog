{% assign post = include.post %}
<article
  class="post-card"
  data-tag-slugs="{% for tag in post.tags %}{{ tag | slugify }}{% unless forloop.last %},{% endunless %}{% endfor %}"
>
  <a href="{{ post.url }}" class="post-card-link" aria-label="{{ post.title | escape }}">
    {% if post.cover_photo %}
      <div class="post-card-media">
        <img src="{{ post.cover_photo }}" class="post-card-image" alt="{{ post.title | escape }} cover photo" loading="lazy">
      </div>
    {% endif %}
    <div class="post-card-body">
      {% if post.tags %}
        <div class="post-card-tags">
          {% for tag in post.tags limit: 3 %}
            <span class="post-card-tag">{{ tag }}</span>
          {% endfor %}
        </div>
      {% endif %}
      <h3 class="post-card-title">{{ post.title }}</h3>
      <p class="post-card-meta">
        <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: site.post.date_format }}</time>
        <span class="post-read-time-badge">{{ post.content | read_time }}</span>
      </p>
    </div>
  </a>
</article>
