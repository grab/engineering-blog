---
layout: default
---
<div class="wrapper search-page">
  <h1 class="page-heading">Search Results</h1>

  <form action="/search.html" role="search" class="search-page-form" id="search-page-form">
    <label class="search-page-label" for="search-page-input">Search articles</label>
    <div class="search-page-input-row">
      <input
        type="search"
        name="q"
        id="search-page-input"
        class="search-page-input"
        placeholder="Search titles, tags, and article content..."
        autocomplete="off"
        aria-label="Search articles"
      >
      <button type="submit" class="search-page-submit">Search</button>
    </div>
    <p class="search-page-hint">Title matches appear as you type in the header. This page searches full article content.</p>
  </form>

  <p id="search-results-summary" class="search-results-summary" aria-live="polite"></p>
  <ul class="posts-summary-posts-list posts-search-results" id="search-results"></ul>
</div>
<script>
  window.searchStore = {
    {% for post in site.posts %}
      {{ post.url | slugify | jsonify }}: {
        "title": {{ post.title | jsonify }},
        "author": {{ post.authors | jsonify }},
        "tags": {{ post.tags | jsonify }},
        "category": {{ post.category | jsonify }},
        "excerpt": {{ post.excerpt | default: post.content | strip_html | strip_newlines | truncate: 220 | jsonify }},
        "date": {{ post.date | date: site.post.date_format | jsonify }},
        "content": {{ post.content | strip_html | strip_newlines | jsonify }},
        "url": {{ post.url | jsonify }}
      }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  };
</script>
<script src="/js/lunr.min.js"></script>
<script src="/js/search.js"></script>
